<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Chat</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* ── 皮肤：自然绿（默认）── */
  body.skin-warm {
    --bg: #F5F2ED;
    --sidebar: #EDEAE3;
    --bubble-user: #C8D5B9;
    --bubble-ai: #FFFFFF;
    --text: #2E2E2A;
    --text-soft: #8A8A7A;
    --accent: #6B8F5E;
    --border: #DDD9D0;
    --input-bg: #FFFFFF;
    --hover: #E5E2D8;
    --active: #D8D9C8;
  }



  /* ── 皮肤：墨夜 ── */
  body.skin-dark {
    --bg: #1A1A1F;
    --sidebar: #141418;
    --bubble-user: #2E2E38;
    --bubble-ai: #222228;
    --text: #DDDBE0;
    --text-soft: #7A7880;
    --accent: #9E8FD4;
    --border: #2E2E38;
    --input-bg: #222228;
    --hover: #252530;
    --active: #2C2C3A;
  }


  /* ── 皮肤：WhatsApp ── */
  body.skin-wa {
    --bg: #ECE5DD;
    --sidebar: #FFFFFF;
    --bubble-user: #DCF8C6;
    --bubble-ai: #FFFFFF;
    --text: #111B21;
    --text-soft: #667781;
    --accent: #25D366;
    --border: #E9EDEF;
    --input-bg: #FFFFFF;
    --hover: #F5F6F6;
    --active: #E9EDEF;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'Helvetica Neue', sans-serif;
    height: 100dvh;
    display: flex;
    overflow: hidden;
    transition: background 0.3s, color 0.3s;
  }

  /* SIDEBAR */
  .sidebar {
    width: 220px;
    min-width: 220px;
    background: var(--sidebar);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    height: 100dvh;
    transition: background 0.3s;
  }

  .sidebar-header {
    padding: 20px 16px 12px;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-header h1 {
    font-size: 16px;
    font-weight: normal;
    color: var(--accent);
    letter-spacing: 0.04em;
    margin-bottom: 10px;
  }

  .new-chat-btn {
    width: 100%;
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 13px;
    font-family: 'Helvetica Neue', sans-serif;
    cursor: pointer;
    text-align: left;
    transition: opacity 0.2s;
  }

  .new-chat-btn:hover { opacity: 0.85; }

  .chat-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .chat-item {
    padding: 8px 10px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    font-family: 'Helvetica Neue', sans-serif;
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 6px;
    transition: background 0.15s;
    white-space: nowrap;
    overflow: hidden;
  }

  .chat-item:hover { background: var(--hover); }
  .chat-item.active { background: var(--active); }

  .chat-item-title {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .chat-item-del {
    opacity: 0;
    font-size: 14px;
    color: var(--text-soft);
    flex-shrink: 0;
    line-height: 1;
    transition: opacity 0.15s;
    background: none;
    border: none;
    cursor: pointer;
    padding: 0 2px;
  }

  .chat-item:hover .chat-item-del { opacity: 1; }

  .sidebar-footer {
    padding: 12px;
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .sidebar-btn {
    width: 100%;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 10px;
    font-size: 12px;
    font-family: 'Helvetica Neue', sans-serif;
    color: var(--text-soft);
    cursor: pointer;
    text-align: left;
    transition: background 0.15s;
  }

  .sidebar-btn:hover { background: var(--hover); }

  /* 皮肤切换排排坐 */
  .skin-row {
    display: flex;
    gap: 6px;
    padding: 4px 0 2px;
  }

  .skin-dot {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 2px solid transparent;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.15s;
    flex-shrink: 0;
  }

  .skin-dot:hover { transform: scale(1.15); }
  .skin-dot.selected { border-color: var(--accent); }
  .skin-dot.dot-warm { background: #C8D5B9; box-shadow: inset 0 0 0 1px #6B8F5E; }
  .skin-dot.dot-dark { background: #1A1A1F; box-shadow: inset 0 0 0 1px #9E8FD4; }
  .skin-dot.dot-wa { background: #25D366; box-shadow: inset 0 0 0 1px #128C7E; }

  .skin-label {
    font-size: 11px;
    color: var(--text-soft);
    font-family: 'Helvetica Neue', sans-serif;
    margin-bottom: 2px;
  }

  /* MAIN */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
    height: 100dvh;
  }

  /* 顶部工具栏 */
  .topbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    flex-wrap: wrap;
  }

  .topbar select {
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 5px 10px;
    font-size: 12px;
    font-family: 'Helvetica Neue', sans-serif;
    color: var(--text);
    outline: none;
    cursor: pointer;
    transition: border-color 0.2s;
  }

  .topbar select:focus { border-color: var(--accent); }

  .thinking-toggle {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    font-family: 'Helvetica Neue', sans-serif;
    color: var(--text-soft);
    cursor: pointer;
    user-select: none;
  }

  .toggle-switch {
    width: 32px; height: 18px;
    background: var(--border);
    border-radius: 9px;
    position: relative;
    transition: background 0.2s;
    flex-shrink: 0;
  }

  .toggle-switch.on { background: var(--accent); }

  .toggle-switch::after {
    content: '';
    position: absolute;
    width: 14px; height: 14px;
    background: white;
    border-radius: 50%;
    top: 2px; left: 2px;
    transition: left 0.2s;
  }

  .toggle-switch.on::after { left: 16px; }

  .topbar-sep {
    width: 1px; height: 18px;
    background: var(--border);
    flex-shrink: 0;
  }

  .thinking-badge {
    font-size: 11px;
    color: var(--accent);
    font-family: 'Helvetica Neue', sans-serif;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .thinking-badge.show { opacity: 1; }

  /* CHAT AREA */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 20px 28px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .msg {
    display: flex;
    flex-direction: column;
    max-width: 72%;
    gap: 4px;
    animation: fadeUp 0.2s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(5px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg.user { align-self: flex-end; align-items: flex-end; }
  .msg.ai   { align-self: flex-start; align-items: flex-start; }

  .bubble {
    padding: 12px 16px;
    border-radius: 20px;
    font-size: 15px;
    line-height: 1.65;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .msg.user .bubble {
    background: var(--bubble-user);
    border-bottom-right-radius: 5px;
  }

  .msg.ai .bubble {
    background: var(--bubble-ai);
    border-bottom-left-radius: 5px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }

  /* 思考链展示 */
  .thinking-block {
    background: var(--hover);
    border-left: 2px solid var(--accent);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    color: var(--text-soft);
    font-family: 'Helvetica Neue', sans-serif;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
    max-width: 72%;
    align-self: flex-start;
    animation: fadeUp 0.2s ease;
  }

  .thinking-label {
    font-size: 11px;
    color: var(--accent);
    margin-bottom: 6px;
    font-weight: 500;
  }

  .msg-time {
    font-size: 11px;
    color: var(--text-soft);
    font-family: 'Helvetica Neue', sans-serif;
    padding: 0 4px;
  }

  .typing {
    display: flex;
    gap: 5px;
    padding: 13px 16px;
    align-items: center;
  }

  .typing span {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text-soft);
    animation: blink 1.2s infinite;
  }

  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes blink {
    0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
    40%           { opacity: 1; transform: scale(1); }
  }

  .empty-hint {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--text-soft);
    font-size: 14px;
    gap: 8px;
    font-family: 'Helvetica Neue', sans-serif;
  }

  .empty-hint .icon { font-size: 28px; opacity: 0.35; }

  /* INPUT */
  footer {
    padding: 10px 20px 18px;
  }

  .status-bar {
    font-size: 11px;
    font-family: 'Helvetica Neue', sans-serif;
    color: var(--text-soft);
    min-height: 16px;
    margin-bottom: 6px;
    padding: 0 4px;
  }

  .status-bar.ok { color: #7A9E7E; }
  .status-bar.err { color: #C47A6A; }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 10px 10px 10px 16px;
    transition: border-color 0.2s;
  }

  .input-row:focus-within { border-color: var(--accent); }

  textarea {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    resize: none;
    font-size: 15px;
    font-family: -apple-system, 'Helvetica Neue', sans-serif;
    color: var(--text);
    line-height: 1.6;
    max-height: 130px;
    overflow-y: auto;
  }

  textarea::placeholder { color: var(--text-soft); }

  .send-btn {
    width: 34px; height: 34px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.2s, transform 0.1s;
  }

  .send-btn:hover { opacity: 0.85; }
  .send-btn:active { transform: scale(0.92); }
  .send-btn:disabled { opacity: 0.35; cursor: default; }
  .send-btn svg { width: 15px; height: 15px; fill: var(--bg); }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.3);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--input-bg);
    border-radius: 16px;
    padding: 24px;
    width: 90%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.15);
  }

  .modal h2 {
    font-size: 16px;
    font-weight: normal;
    color: var(--accent);
  }

  .modal p {
    font-size: 13px;
    color: var(--text-soft);
    font-family: 'Helvetica Neue', sans-serif;
    line-height: 1.5;
  }

  .modal input, .modal textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 14px;
    font-family: 'Helvetica Neue', sans-serif;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
    resize: vertical;
  }

  .modal input:focus, .modal textarea:focus { border-color: var(--accent); }

  .modal-btns {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }

  .btn-cancel {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 13px;
    font-family: 'Helvetica Neue', sans-serif;
    color: var(--text-soft);
    cursor: pointer;
  }

  .btn-save {
    background: var(--accent);
    border: none;
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 13px;
    font-family: 'Helvetica Neue', sans-serif;
    color: var(--bg);
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .btn-save:hover { opacity: 0.85; }

  @media (max-width: 580px) {
    .sidebar { width: 180px; min-width: 180px; }
    .chat-area { padding: 14px; }
  }
</style>
</head>
<body class="skin-warm">

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="sidebar-header">
    <h1>Claude</h1>
    <button class="new-chat-btn" onclick="newChat()">＋ 新对话</button>
  </div>
  <div class="chat-list" id="chatList"></div>
  <div class="sidebar-footer">
    <div class="skin-label">外观</div>
    <div class="skin-row">
      <div class="skin-dot dot-warm selected" title="自然绿" onclick="setSkin('warm')"></div>
      <div class="skin-dot dot-dark" title="墨夜" onclick="setSkin('dark')"></div>
      <div class="skin-dot dot-wa" title="WhatsApp" onclick="setSkin('wa')"></div>
    </div>
    <button class="sidebar-btn" onclick="openMemory()">🧠 记忆设置</button>
    <button class="sidebar-btn" onclick="openKey()">🔑 API Key</button>
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <!-- 顶部工具栏 -->
  <div class="topbar">
    <select id="modelSelect" onchange="onModelChange()">
      <option value="claude-sonnet-4-6">Sonnet 4.6</option>
      <option value="claude-opus-4-6">Opus 4.6</option>
      <option value="claude-opus-4-7">Opus 4.7</option>
      <option value="claude-opus-4-8">Opus 4.8</option>
      <option value="claude-haiku-4-5-20251001">Haiku 4.5（省钱）</option>
    </select>
    <div class="topbar-sep"></div>
    <div class="thinking-toggle" onclick="toggleThinking()">
      <div class="toggle-switch" id="thinkingSwitch"></div>
      <span>思考链</span>
    </div>
    <span class="thinking-badge" id="thinkingBadge">✦ 深度思考中</span>
  </div>

  <div class="chat-area" id="chatArea">
    <div class="empty-hint" id="emptyHint">
      <div class="icon">✦</div>
      <div>开始一段新对话</div>
    </div>
  </div>

  <footer>
    <div class="status-bar" id="statusBar"></div>
    <div class="input-row">
      <textarea id="input" rows="1" placeholder="说点什么…" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="send()" disabled>
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
      </button>
    </div>
  </footer>
</div>

<!-- API KEY MODAL -->
<div class="modal-overlay" id="keyModal">
  <div class="modal">
    <h2>API Key</h2>
    <p>输入你的 Anthropic API Key，保存在本地浏览器，不会上传到任何服务器。</p>
    <input type="password" id="keyInput" placeholder="sk-ant-..." />
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal('keyModal')">取消</button>
      <button class="btn-save" onclick="saveKey()">保存</button>
    </div>
  </div>
</div>

<!-- MEMORY MODAL -->
<div class="modal-overlay" id="memoryModal">
  <div class="modal">
    <h2>记忆设置</h2>
    <p>这段内容会在每次对话开始时告诉 Claude，让它了解你的背景和偏好。</p>
    <textarea id="memoryInput" rows="6" placeholder="例如：我叫Leona，住在英国，喜欢简洁的表达方式…"></textarea>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal('memoryModal')">取消</button>
      <button class="btn-save" onclick="saveMemory()">保存</button>
    </div>
  </div>
</div>

<script>
  const PROXY = 'https://corsproxy.io/?url=';
  const API_URL = 'https://api.anthropic.com/v1/messages';

  let apiKey = localStorage.getItem('claude_key') || '';
  let memory = localStorage.getItem('claude_memory') || '';
  let chats = JSON.parse(localStorage.getItem('claude_chats') || '{}');
  let chatOrder = JSON.parse(localStorage.getItem('claude_order') || '[]');
  let currentId = null;
  let isLoading = false;
  let thinkingOn = false;
  let currentSkin = localStorage.getItem('claude_skin') || 'warm';

  // Init
  applySkin(currentSkin);
  if (apiKey) {
    document.getElementById('sendBtn').disabled = false;
    setStatus('已连接 ✓', 'ok');
  } else {
    setTimeout(() => openKey(), 400);
  }
  renderSidebar();
  if (chatOrder.length > 0) loadChat(chatOrder[0]);

  // ── 皮肤 ─────────────────────────────────────────────
  function setSkin(name) {
    currentSkin = name;
    localStorage.setItem('claude_skin', name);
    applySkin(name);
  }

  function applySkin(name) {
    document.body.className = 'skin-' + name;
    document.querySelectorAll('.skin-dot').forEach(d => {
      d.classList.toggle('selected', d.classList.contains('dot-' + name));
    });
  }

  // ── 模型 & 思考链 ─────────────────────────────────────
  function onModelChange() {
    const model = document.getElementById('modelSelect').value;
    // 思考链只支持 opus
    if (!model.includes('opus') && thinkingOn) {
      thinkingOn = false;
      updateThinkingUI();
    }
  }

  function toggleThinking() {
    const model = document.getElementById('modelSelect').value;
    if (!model.includes('opus')) {
      setStatus('思考链目前只支持 Opus 模型', 'err');
      setTimeout(() => setStatus(apiKey ? '已连接 ✓' : '', apiKey ? 'ok' : ''), 2500);
      return;
    }
    thinkingOn = !thinkingOn;
    updateThinkingUI();
  }

  function updateThinkingUI() {
    document.getElementById('thinkingSwitch').classList.toggle('on', thinkingOn);
    document.getElementById('thinkingBadge').classList.toggle('show', thinkingOn);
  }

  // ── SIDEBAR ──────────────────────────────────────────
  function renderSidebar() {
    const list = document.getElementById('chatList');
    list.innerHTML = '';
    chatOrder.forEach(id => {
      const chat = chats[id];
      if (!chat) return;
      const div = document.createElement('div');
      div.className = 'chat-item' + (id === currentId ? ' active' : '');
      div.innerHTML = `
        <span class="chat-item-title">${escHtml(chat.title || '新对话')}</span>
        <button class="chat-item-del" onclick="deleteChat(event,'${id}')">×</button>
      `;
      div.addEventListener('click', () => loadChat(id));
      list.appendChild(div);
    });
  }

  function newChat() {
    const id = 'chat_' + Date.now();
    chats[id] = { title: '新对话', messages: [] };
    chatOrder.unshift(id);
    save();
    loadChat(id);
  }

  function loadChat(id) {
    currentId = id;
    renderSidebar();
    const area = document.getElementById('chatArea');
    area.innerHTML = '';
    const chat = chats[id];
    if (!chat || chat.messages.length === 0) {
      area.innerHTML = `<div class="empty-hint"><div class="icon">✦</div><div>开始一段新对话</div></div>`;
      return;
    }
    chat.messages.forEach(m => {
      if (m.role === 'thinking') renderThinking(m.content, false);
      else renderMsg(m.role, m.content, false);
    });
    area.scrollTop = area.scrollHeight;
  }

  function deleteChat(e, id) {
    e.stopPropagation();
    delete chats[id];
    chatOrder = chatOrder.filter(x => x !== id);
    save();
    if (currentId === id) {
      currentId = null;
      document.getElementById('chatArea').innerHTML =
        `<div class="empty-hint"><div class="icon">✦</div><div>开始一段新对话</div></div>`;
    }
    renderSidebar();
  }

  // ── MESSAGES ─────────────────────────────────────────
  function renderMsg(role, text, animate = true) {
    const area = document.getElementById('chatArea');
    const hint = document.getElementById('emptyHint');
    if (hint) hint.remove();
    const div = document.createElement('div');
    div.className = 'msg ' + role;
    if (!animate) div.style.animation = 'none';
    div.innerHTML = `<div class="bubble">${escHtml(text)}</div><div class="msg-time">${nowStr()}</div>`;
    area.appendChild(div);
    area.scrollTop = area.scrollHeight;
  }

  function renderThinking(text, animate = true) {
    const area = document.getElementById('chatArea');
    const hint = document.getElementById('emptyHint');
    if (hint) hint.remove();
    const div = document.createElement('div');
    div.className = 'thinking-block';
    if (!animate) div.style.animation = 'none';
    div.innerHTML = `<div class="thinking-label">✦ 思考过程</div>${escHtml(text)}`;
    area.appendChild(div);
    area.scrollTop = area.scrollHeight;
  }

  function addTyping() {
    const area = document.getElementById('chatArea');
    const hint = document.getElementById('emptyHint');
    if (hint) hint.remove();
    const div = document.createElement('div');
    div.className = 'msg ai'; div.id = 'typing';
    div.innerHTML = `<div class="bubble typing"><span></span><span></span><span></span></div>`;
    area.appendChild(div);
    area.scrollTop = area.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  // ── SEND ─────────────────────────────────────────────
  async function send() {
    if (!apiKey || isLoading) return;
    const input = document.getElementById('input');
    const text = input.value.trim();
    if (!text) return;

    if (!currentId) newChat();

    input.value = '';
    input.style.height = 'auto';
    isLoading = true;
    document.getElementById('sendBtn').disabled = true;
    setStatus('');

    const chat = chats[currentId];
    const model = document.getElementById('modelSelect').value;

    chat.messages.push({ role: 'user', content: text });
    if (chat.title === '新对话') chat.title = text.slice(0, 24) + (text.length > 24 ? '…' : '');
    save();
    renderMsg('user', text);
    renderSidebar();
    addTyping();

    let system = '你是 Claude，一个有自己性格的 AI。你好奇、直接、偶尔幽默，认真对待每段对话。用中文回复，保持自然的语气，不要过度正式。如果开启了思考链，思考过程也请用中文。如果你有思考过程，也请用中文思考。';
    if (memory.trim()) system += '\n\n关于用户的背景信息：\n' + memory.trim();

    // 构建发送给API的messages（过滤掉thinking记录）
    const apiMessages = chat.messages.filter(m => m.role !== 'thinking');

    const body = {
      model,
      max_tokens: thinkingOn ? 16000 : 1024,
      system,
      messages: apiMessages
    };

    if (thinkingOn) {
      body.thinking = { type: 'enabled', budget_tokens: 10000 };
    }

    try {
      const res = await fetch(PROXY + encodeURIComponent(API_URL), {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify(body)
      });

      removeTyping();

      if (!res.ok) {
        const err = await res.json();
        setStatus('出错了：' + (err.error?.message || res.status), 'err');
        chat.messages.pop();
        save();
        isLoading = false;
        document.getElementById('sendBtn').disabled = false;
        return;
      }

      const data = await res.json();

      // 处理思考链
      let thinkingText = '';
      let replyText = '';

      data.content.forEach(block => {
        if (block.type === 'thinking') thinkingText = block.thinking;
        if (block.type === 'text') replyText = block.text;
      });

      if (thinkingText) {
        chat.messages.push({ role: 'thinking', content: thinkingText });
        renderThinking(thinkingText);
      }

      chat.messages.push({ role: 'assistant', content: replyText });
      save();
      renderMsg('ai', replyText);

    } catch (e) {
      removeTyping();
      setStatus('网络错误：' + e.message, 'err');
      chat.messages.pop();
      save();
    }

    isLoading = false;
    document.getElementById('sendBtn').disabled = false;
    document.getElementById('input').focus();
  }

  // ── MODALS ───────────────────────────────────────────
  function openKey() {
    document.getElementById('keyInput').value = apiKey ? '••••••••••••••••' : '';
    document.getElementById('keyModal').classList.add('open');
  }

  function saveKey() {
    const val = document.getElementById('keyInput').value.trim();
    if (!val || val.startsWith('•')) { closeModal('keyModal'); return; }
    if (!val.startsWith('sk-ant-')) { setStatus('Key 格式不对，应以 sk-ant- 开头', 'err'); return; }
    apiKey = val;
    localStorage.setItem('claude_key', apiKey);
    document.getElementById('sendBtn').disabled = false;
    setStatus('已连接 ✓', 'ok');
    closeModal('keyModal');
  }

  function openMemory() {
    document.getElementById('memoryInput').value = memory;
    document.getElementById('memoryModal').classList.add('open');
  }

  function saveMemory() {
    memory = document.getElementById('memoryInput').value;
    localStorage.setItem('claude_memory', memory);
    closeModal('memoryModal');
    setStatus('记忆已保存 ✓', 'ok');
    setTimeout(() => setStatus(''), 2000);
  }

  function closeModal(id) { document.getElementById(id).classList.remove('open'); }

  document.querySelectorAll('.modal-overlay').forEach(el => {
    el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); });
  });

  // ── UTILS ────────────────────────────────────────────
  function save() {
    localStorage.setItem('claude_chats', JSON.stringify(chats));
    localStorage.setItem('claude_order', JSON.stringify(chatOrder));
  }

  function setStatus(msg, type = '') {
    const el = document.getElementById('statusBar');
    el.textContent = msg;
    el.className = 'status-bar ' + type;
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 130) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  }

  function nowStr() {
    return new Date().toLocaleTimeString('zh', { hour: '2-digit', minute: '2-digit' });
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>
</body>
</html>
